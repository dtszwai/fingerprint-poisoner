<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FingerprintPoisoner Settings</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans",
          "Helvetica Neue", sans-serif;
        width: 320px;
        margin: 0;
        padding: 16px;
        color: #333;
      }

      h1 {
        font-size: 18px;
        margin-top: 0;
        margin-bottom: 16px;
        border-bottom: 1px solid #ddd;
        padding-bottom: 8px;
      }

      .toggle-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .toggle-label {
        font-weight: 500;
      }

      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 20px;
      }

      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.4s;
        border-radius: 20px;
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 2px;
        bottom: 2px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }

      input:checked + .slider {
        background-color: #2196f3;
      }

      input:checked + .slider:before {
        transform: translateX(20px);
      }

      .settings-section {
        margin-top: 16px;
        padding-top: 8px;
        border-top: 1px solid #eee;
      }

      .range-container {
        display: flex;
        flex-direction: column;
        margin-bottom: 12px;
      }

      .range-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 4px;
      }

      .range-value {
        font-weight: bold;
      }

      .footer {
        margin-top: 16px;
        font-size: 12px;
        color: #777;
        text-align: center;
      }

      button {
        background-color: #2196f3;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 500;
        margin-top: 16px;
        width: 100%;
      }

      button:hover {
        background-color: #0b7dda;
      }
    </style>
  </head>
  <body>
    <h1>FingerprintPoisoner</h1>

    <div class="toggle-container">
      <span class="toggle-label">Enable fingerprint poisoning</span>
      <label class="toggle-switch">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="settings-section">
      <h2>Protection Settings</h2>

      <div class="toggle-container">
        <span class="toggle-label">Poison User-Agent</span>
        <label class="toggle-switch">
          <input type="checkbox" id="poisonUserAgent" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-container">
        <span class="toggle-label">Poison Canvas</span>
        <label class="toggle-switch">
          <input type="checkbox" id="poisonCanvas" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-container">
        <span class="toggle-label">Poison WebGL</span>
        <label class="toggle-switch">
          <input type="checkbox" id="poisonWebGL" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-container">
        <span class="toggle-label">Poison AudioContext</span>
        <label class="toggle-switch">
          <input type="checkbox" id="poisonAudioContext" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-container">
        <span class="toggle-label">Poison ClientRects</span>
        <label class="toggle-switch">
          <input type="checkbox" id="poisonClientRects" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-container">
        <span class="toggle-label">Poison Fonts</span>
        <label class="toggle-switch">
          <input type="checkbox" id="poisonFonts" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-container">
        <span class="toggle-label">Consistent noise per domain</span>
        <label class="toggle-switch">
          <input type="checkbox" id="consistentNoise" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="settings-section">
      <div class="range-container">
        <div class="range-header">
          <span>Noise Level</span>
          <span class="range-value" id="noiseLevelValue">2</span>
        </div>
        <input type="range" min="1" max="4" value="2" id="noiseLevel" />
      </div>
    </div>

    <button id="save">Save Settings</button>
    <button id="view-stats" style="background-color: #4caf50">View Statistics</button>

    <div class="footer">
      <p>FingerprintPoisoner v1.0</p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
